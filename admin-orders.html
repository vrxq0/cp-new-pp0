<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carnaval Perfume | لوحة التحكم - الطلبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A192F;
      color: #F5F2EB;
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
    }
    .gold-accent { color: #C5A572; }
    .btn-primary {
      background: #C5A572;
      color: #0A192F;
      border: none;
      padding: 10px 20px;
      font-weight: 600;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.85rem;
    }
    .btn-primary:hover {
      background: #b3905a;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(197,165,114,0.3);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #C5A572;
      color: #C5A572;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.85rem;
    }
    .btn-outline:hover {
      background: #C5A572;
      color: #0A192F;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      background: rgba(10,25,47,0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(197,165,114,0.2);
      flex-wrap: wrap;
    }
    .logo { font-size: 1.6rem; font-weight: 800; font-family: 'Playfair Display', serif; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { color: #F5F2EB; text-decoration: none; font-weight: 500; transition: 0.2s; }
    .nav-links a:hover { color: #C5A572; }
    .admin-page {
      padding: 6rem 5% 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .admin-page h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }
    .admin-stats {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }
    .stat-card {
      background: rgba(25,45,65,0.7);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 1rem 1.5rem;
      border: 1px solid rgba(197,165,114,0.3);
      text-align: center;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #C5A572;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #A0B3C9;
    }
    .orders-table-container {
      overflow-x: auto;
      margin-top: 1.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(25,45,65,0.5);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 10px;
      text-align: right;
      border-bottom: 1px solid rgba(197,165,114,0.2);
      vertical-align: top;
    }
    th {
      background: rgba(197,165,114,0.2);
      font-weight: 600;
      color: #C5A572;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .status-pending { background: #f39c12; color: #0A192F; }
    .status-confirmed { background: #2ecc71; color: #0A192F; }
    .status-shipped { background: #3498db; color: white; }
    .status-delivered { background: #9b59b6; color: white; }
    select.status-select {
      background: rgba(255,255,255,0.1);
      border: 1px solid #C5A572;
      color: #F5F2EB;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .order-items-list {
      font-size: 0.8rem;
      line-height: 1.4;
    }
    .order-items-list span {
      display: block;
    }
    .refresh-btn {
      margin: 1rem 0;
    }
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10,25,47,0.98);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #102B3F;
      border-radius: 32px;
      padding: 2rem;
      text-align: center;
      border-top: 4px solid #C5A572;
      width: 300px;
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 1rem 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(197,165,114,0.5);
      border-radius: 40px;
      color: #F5F2EB;
    }
    .error-msg {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #C5A572;
      color: #0A192F;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      z-index: 3000;
      animation: fadeOut 2s forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
    @media (max-width: 768px) {
      th, td { font-size: 0.7rem; padding: 8px 5px; }
      .stat-card { padding: 0.5rem 1rem; }
      .admin-page h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="navbar">
    <div class="logo">CARNAVAL <span class="gold-accent">ADMIN</span></div>
    <div class="nav-links">
      <a href="index.html">الموقع الرئيسي</a>
      <a href="admin-orders.html" style="color:#C5A572;">الطلبات</a>
    </div>
  </div>
</header>

<section class="admin-page" id="adminContent" style="display: none;">
  <h1>📋 جميع طلبات الزبائن</h1>
  <div class="admin-stats" id="statsContainer"></div>
  <div class="refresh-btn">
    <button class="btn-primary" id="refreshOrdersBtn"><i class="fas fa-sync-alt"></i> تحديث الطلبات</button>
  </div>
  <div class="orders-table-container">
    <table id="ordersTable">
      <thead>
        <tr>
          <th>رقم الطلب</th>
          <th>التاريخ</th>
          <th>العميل</th>
          <th>الهاتف</th>
          <th>العنوان</th>
          <th>المنتجات</th>
          <th>الإجمالي</th>
          <th>الحالة</th>
          <th>تغيير الحالة</th>
        </tr>
      </thead>
      <tbody id="ordersTableBody">
        <tr><td colspan="9" style="text-align:center;">جاري تحميل الطلبات...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <i class="fas fa-lock gold-accent" style="font-size: 2rem;"></i>
    <h3 style="margin: 1rem 0;">دخول المسؤول</h3>
    <input type="password" id="adminPassword" placeholder="كلمة المرور">
    <button class="btn-primary" id="loginBtn">تسجيل الدخول</button>
    <div id="loginError" class="error-msg"></div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getFirestore, collection, getDocs, updateDoc, doc, query, orderBy } from 'firebase/firestore';
  
  // 🔥 Firebase Config – استبدل هذه البيانات ببيانات مشروعك
  const firebaseConfig = {
    apiKey: "AIzaSyB...",      // <--- ضع المفتاح الصحيح
    authDomain: "carnaval-perfume.firebaseapp.com",
    projectId: "carnaval-perfume",
    storageBucket: "carnaval-perfume.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  // كلمة المرور (يمكنك تغييرها)
  const ADMIN_PASSWORD = "admin123";
  
  let ordersData = [];
  
  function showToast(msg) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
  }
  
  async function loadOrders() {
    const ordersRef = collection(db, 'orders');
    const q = query(ordersRef, orderBy('timestamp', 'desc'));
    const snapshot = await getDocs(q);
    ordersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderOrders();
    renderStats();
  }
  
  function renderStats() {
    const statsContainer = document.getElementById('statsContainer');
    const total = ordersData.length;
    const pending = ordersData.filter(o => o.status === 'pending').length;
    const confirmed = ordersData.filter(o => o.status === 'confirmed').length;
    const shipped = ordersData.filter(o => o.status === 'shipped').length;
    const delivered = ordersData.filter(o => o.status === 'delivered').length;
    statsContainer.innerHTML = `
      <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">إجمالي الطلبات</div></div>
      <div class="stat-card"><div class="stat-number">${pending}</div><div class="stat-label">قيد الانتظار</div></div>
      <div class="stat-card"><div class="stat-number">${confirmed}</div><div class="stat-label">مؤكدة</div></div>
      <div class="stat-card"><div class="stat-number">${shipped}</div><div class="stat-label">تم الشحن</div></div>
      <div class="stat-card"><div class="stat-number">${delivered}</div><div class="stat-label">تم التسليم</div></div>
    `;
  }
  
  function renderOrders() {
    const tbody = document.getElementById('ordersTableBody');
    if (ordersData.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">لا توجد طلبات بعد</td></tr>';
      return;
    }
    tbody.innerHTML = ordersData.map(order => {
      const date = order.timestamp ? new Date(order.timestamp).toLocaleString('ar-EG') : 'غير محدد';
      const customer = order.customerInfo || {};
      const itemsList = order.items ? order.items.map(item => `${item.name} (x${item.quantity})`).join('<br>') : '-';
      const total = order.total || 0;
      const status = order.status || 'pending';
      let statusClass = '';
      if (status === 'pending') statusClass = 'status-pending';
      else if (status === 'confirmed') statusClass = 'status-confirmed';
      else if (status === 'shipped') statusClass = 'status-shipped';
      else if (status === 'delivered') statusClass = 'status-delivered';
      
      return `
        <tr>
          <td>${order.id.slice(0, 8)}...</td>
          <td>${date}</td>
          <td>${customer.fullName || ''} ${customer.lastName || ''}</td>
          <td>${customer.phone || ''}</td>
          <td>${customer.address || ''}<br>${customer.city || ''}</td>
          <td class="order-items-list">${itemsList}</td>
          <td>${total} د.ج</td>
          <td><span class="status-badge ${statusClass}">${status === 'pending' ? 'قيد الانتظار' : status === 'confirmed' ? 'مؤكدة' : status === 'shipped' ? 'تم الشحن' : 'تم التسليم'}</span></td>
          <td>
            <select class="status-select" data-id="${order.id}" data-status="${status}">
              <option value="pending" ${status === 'pending' ? 'selected' : ''}>قيد الانتظار</option>
              <option value="confirmed" ${status === 'confirmed' ? 'selected' : ''}>مؤكدة</option>
              <option value="shipped" ${status === 'shipped' ? 'selected' : ''}>تم الشحن</option>
              <option value="delivered" ${status === 'delivered' ? 'selected' : ''}>تم التسليم</option>
            </select>
          </td>
        </tr>
      `;
    }).join('');
    
    // ربط أحداث تغيير الحالة
    document.querySelectorAll('.status-select').forEach(select => {
      select.addEventListener('change', async (e) => {
        const orderId = select.dataset.id;
        const newStatus = select.value;
        try {
          const orderRef = doc(db, 'orders', orderId);
          await updateDoc(orderRef, { status: newStatus });
          showToast(`تم تحديث حالة الطلب إلى ${newStatus}`);
          await loadOrders(); // إعادة تحميل البيانات
        } catch (err) {
          showToast('حدث خطأ أثناء تحديث الحالة');
          console.error(err);
        }
      });
    });
  }
  
  // حماية الصفحة بكلمة مرور
  function checkAuth() {
    const isLogged = localStorage.getItem('admin_logged') === 'true';
    if (isLogged) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      loadOrders();
    } else {
      document.getElementById('loginOverlay').style.display = 'flex';
      document.getElementById('adminContent').style.display = 'none';
    }
  }
  
  document.getElementById('loginBtn').addEventListener('click', () => {
    const password = document.getElementById('adminPassword').value;
    if (password === ADMIN_PASSWORD) {
      localStorage.setItem('admin_logged', 'true');
      checkAuth();
    } else {
      document.getElementById('loginError').innerText = 'كلمة المرور غير صحيحة';
    }
  });
  
  document.getElementById('refreshOrdersBtn').addEventListener('click', () => {
    loadOrders();
  });
  
  checkAuth();
</script>
</body>
</html>
